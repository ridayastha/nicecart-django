{% extends 'base.html' %}

{% block content %}
<section class="section-content padding-y" style="min-height:84vh">
    <div class="card mx-auto" style="max-width: 380px; margin-top:50px;">
        <div class="card-body">
            <h4 class="card-title mb-4 text-center">Sign in</h4>

            {% include 'includes/alerts.html' %}

            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <input type="email" class="form-control" placeholder="Email Address" name="email" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-control" placeholder="Password" name="password" required>
                </div>
                <div class="form-group">
                    <a href="{% url 'forgotPassword' %}" class="float-right text-primary">Forgot password?</a>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-dark btn-block rounded-0"> Login </button>
                </div>
            </form>
        </div>
    </div>
    <p class="text-center mt-4">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
</section>
{% endblock %}
