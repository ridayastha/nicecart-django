<div class="col-md-3">
    <div class="card card-product-grid rounded-lg">
        <a href="{{ product.get_url }}" class="img-wrap">
            <img src="{{ product.images.url }}" class="mt-3 rounded-lg">
        </a>

        <div class="info-wrap p-3">
            <a href="{{ product.get_url }}" class="title mt-1 text-center d-block text-dark">
                {{ product.product_name }}
            </a>

            <div class="price mt-1 text-center"><strong>$ {{ product.price }}</strong></div>

            {% if product.stock <= 0 %}
                <button class="btn btn-sm btn-danger w-100 p-3 mt-2 rounded-0" disabled>
                    <i class="fa fa-times-circle"></i> Out of Stock
                </button>
            {% else %}
                <a href="{{ product.get_url }}" class="btn btn-sm btn-outline-dark w-100 p-3 mt-2 rounded-0">
                    <i class="fa fa-shopping-cart me-1"></i> Add to Cart
                </a>
            {% endif %}
        </div>
    </div>
</div>
