<footer class="text-center text-dark pt-4 border-top">
  <!-- Newsletter -->
  <div class="container mb-4">
    <h5 class="fw-bold">Sign up for our newsletter!</h5>
    <p class="text-muted small">Stay updated with exclusive deals and offers!</p>
    <form method="POST" action="" class="row justify-content-center g-2">
      {% csrf_token %}
      <div class="col-12 col-sm-8 col-md-6">
        <div class="input-group">
          <input type="email" name="email" id="id_email" class="form-control" placeholder="Enter your email" required>
          <button class="btn btn-primary" type="submit">Subscribe</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Social Media -->
  <div class="mb-3">
    <a class="btn text-white btn-sm rounded-circle m-1" style="background:#3b5998;" href="#"><i class="fab fa-facebook-f"></i></a>
    <a class="btn text-white btn-sm rounded-circle m-1" style="background:#ca0000;" href="#"><i class="fab fa-youtube"></i></a>
    <a class="btn text-white btn-sm rounded-circle m-1" style="background:#55acee;" href="#"><i class="fab fa-twitter"></i></a>
    <a class="btn text-white btn-sm rounded-circle m-1" style="background:#dc311b;" href="#"><i class="fab fa-instagram"></i></a>
  </div>

  <!-- Copyright -->
  <div class="text-center py-2 border-top">
    <small class="text-muted">© 2025 Company Name. All rights reserved.</small>
  </div>
</footer>
