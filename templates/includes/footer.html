<!-- ========================= DARK FOOTER ========================= -->
<footer class="text-center text-dark pt-5 border border-light">
  

  <!-- Email Subscription Form -->
  <div class="container p-2">
    <section>
      <form method="POST" action="">
        {% csrf_token %}

        <!-- Centered heading -->
        <div class="row justify-content-center mb-2">
          <div class="col-12">
            <h5 class="text-dark fw-bold">Sign up for our newsletter!</h5>
            <p class="text-muted small">Stay updated with exclusive deals and offers</p>
          </div>
        </div>

        <!-- Input + Button -->
        <div class="row justify-content-center">
          <div class="col-lg-6 col-md-8 col-sm-10">
            <div class="input-group shadow-sm">
              <input type="email" name="email" id="id_email" class="form-control text-dark" placeholder="Enter your email" required>
              <button class="btn btn-dark px-3" type="submit">Subscribe</button>
            </div>
          </div>
        </div>
      </form>
    </section>
  </div>

  <!-- Social Media Section -->
  <div class="container p-4 pb-0">
    <section class="mb-2">
      <!-- Social Buttons with your colors -->
      <a class="btn text-white btn-floating m-1 rounded-circle" style="background-color: #3b5998;" href="#">
        <i class="fab fa-facebook-f"></i>
      </a>
      <a class="btn text-white btn-floating m-1 rounded-circle" style="background-color: #ca0000;" href="#">
        <i class="fab fa-youtube"></i>
      </a>
      <a class="btn text-white btn-floating m-1 rounded-circle" style="background-color: #55acee;" href="#">
        <i class="fab fa-twitter"></i>
      </a>
      <a class="btn text-white btn-floating m-1 rounded-circle" style="background-color: #dc311b;" href="#">
        <i class="fab fa-instagram"></i>
      </a>
    </section>
  </div>

  <!-- Copyright -->
  <div class="text-center p-2 mt-4 border-top border-light" style="background-color: rgba(255, 255, 255, 0.05);">
    <small class="text-muted">© 2025 Company Name. All rights reserved.</small>
  </div>
</footer>
<!-- ========================= FOOTER END ========================= -->

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
	$(document).ready(function(){
		$('.thumb a').click(function(e){
			e.preventDefault();
			$('.mainImage img').attr('src', $(this).attr("href"));
		})
	})
</script>

</body>
</html>
